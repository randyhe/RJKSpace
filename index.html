<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RJKSpace</title>
    <meta
      name="description"
      content="Welcome to RJKSpace. Explore my games and creations."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/css/styles.css" />
  </head>
  <body>
    <main class="homepage">
      <section class="hero">
        <p class="eyebrow">RJKSPACE / GAMES</p>
        <h1>Welcome to RJKSpace!</h1>
        <p class="hero-subtitle">Explore my games below.</p>
      </section>

      <section class="projects">
        <div class="project-grid">
          <a
            class="project-card"
            href="https://cellular-gridworks.rjkspace.com"
            target="_blank"
            rel="noopener noreferrer"
          >
            <div class="project-icon">CG</div>
            <h2>Cellular Gridworks</h2>
            <p>Build, watch, and experiment in a game inspired by Conway's Game of Life.</p>
            <span class="project-link">Play now →</span>
          </a>

          <a
            class="project-card"
            href="https://mailbox-heist.rjkspace.com"
            target="_blank"
            rel="noopener noreferrer"
          >
            <div class="project-icon">MH</div>
            <h2>Mailbox Heist</h2>
            <p>Sneak through the neighborhood as a clever raccoon on the ultimate mail-stealing heist.</p>
            <span class="project-link">Play now →</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
